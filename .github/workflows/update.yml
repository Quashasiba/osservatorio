name: Aggiorna dati mensili

on:
  schedule:
    # Schedule ottimizzato sulle fonti. Il job riscarica TUTTE le fonti a ogni
    # run, ma ogni fetch è idempotente (salta se il periodo è già nel JSON):
    # aggiungere giorni di retry costa zero e non produce commit doppi.
    #
    # 1) UNRAE pubblica i dati BEV nei primi 1-4 giorni del mese successivo,
    #    ma può slittare (a giugno 2026 maggio non era ancora uscito il giorno 8).
    #    Tentiamo il 6, 10 e 14 di OGNI mese alle 09:00 UTC (~10:00/11:00 it):
    #    3 tentativi mensili coprono gli slittamenti senza aspettare il mese dopo.
    #    Questi run mensili ridanno una chance anche a tutte le altre fonti.
    - cron: "0 9 6,10,14 * *"
    #
    # 2) PoliMi (Osservatorio Innovative Payments) pubblica il dato annuale
    #    cashless intorno al 12 marzo. Run extra il 16 e il 23 marzo per
    #    cogliere il dato anche in caso di slittamento, senza aspettare aprile.
    - cron: "0 9 16,23 3 *"
    #
    # 3) First CISL pubblica il report annuale della desertificazione bancaria
    #    a fine gennaio. Run extra il 31 gennaio e il 7 febbraio (retry) per
    #    cogliere il dato fresco anche se la pubblicazione slitta a inizio mese.
    - cron: "0 9 31 1 *"
    - cron: "0 9 7 2 *"
    #
    # 4) ACI pubblica l'Autoritratto annuale (parco veicolare) a novembre.
    #    Run extra il 15 e il 22 dicembre per cogliere il dato del nuovo anno
    #    pubblicato qualche settimana prima, con un retry a una settimana.
    - cron: "0 9 15,22 12 *"

  workflow_dispatch: # Permette di lanciarlo manualmente dal tab Actions

permissions:
  contents: write # Necessario per commit dei dati aggiornati

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Fetch dati BEV (UNRAE)
        run: python scripts/fetch_bev.py
        continue-on-error: true # Se UNRAE fallisce, continua con gli altri

      - name: Fetch dati pagamenti (PoliMi)
        run: python scripts/fetch_payments.py
        continue-on-error: true

      - name: Fetch dati operatori mobili (AGCOM)
        run: python scripts/fetch_mobile.py
        continue-on-error: true

      - name: Fetch dati desertificazione bancaria (First CISL)
        run: python scripts/fetch_desertificazione.py
        continue-on-error: true

      - name: Fetch dati mix energetico (ENTSO-E)
        run: python scripts/fetch_energy_mix.py
        env:
          ENTSOE_API_TOKEN: ${{ secrets.ENTSOE_API_TOKEN }}
        continue-on-error: true

      - name: Fetch dati parco auto Milano (ACI Autoritratto)
        run: python scripts/fetch_auto_milano.py
        continue-on-error: true

      - name: Genera sito
        run: python scripts/build_site.py

      - name: Commit e push aggiornamenti
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          if git diff --staged --quiet; then
            echo "Nessun aggiornamento da committare."
          else
            git commit -m "chore: aggiornamento dati $(date -u +'%Y-%m-%d')"
            git push
          fi

      # --- Notifica fallimento (opzionale) ---
      # Decommenta e configura se vuoi notifiche su Slack quando qualcosa va storto.
      # Devi aggiungere SLACK_WEBHOOK_URL come secret nel repo (Settings → Secrets → Actions).
      #
      # - name: Notifica Slack se fallisce
      #   if: failure()
      #   uses: slackapi/slack-github-action@v1.27.0
      #   with:
      #     payload: |
      #       {
      #         "text": "❌ Aggiornamento dati Osservatorio fallito: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      #       }
      #   env:
      #     SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
